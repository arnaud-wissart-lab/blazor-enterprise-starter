<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BlazorEnterpriseStarter</title>
  <desc id="desc">Starter Blazor .NET métier avec UI cohérente, API séparée et backlog démontrable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <rect x="52" y="52" width="1096" height="526" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="92" y="96" width="252" height="438" rx="22" fill="#F8FAFC" stroke="#D8E3F4"/>
  <rect x="388" y="96" width="720" height="118" rx="22" fill="#FFFFFF" stroke="#D8E3F4"/>
  <rect x="388" y="238" width="720" height="180" rx="22" fill="#FFFFFF" stroke="#D8E3F4"/>
  <rect x="388" y="442" width="460" height="92" rx="22" fill="#FFFFFF" stroke="#D8E3F4"/>
  <rect x="872" y="442" width="236" height="92" rx="22" fill="#FFFFFF" stroke="#D8E3F4"/>

  <text x="92" y="84" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.18em">STARTER MÉTIER</text>
  <text x="92" y="174" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">BlazorEnterpriseStarter</text>
  <text x="92" y="228" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="26">Blazor Web App, API séparée, design system et backlog démontrable.</text>

  <rect x="92" y="286" width="174" height="42" rx="21" fill="#E7F0FF"/>
  <rect x="278" y="286" width="198" height="42" rx="21" fill="#EEF7EF"/>
  <rect x="488" y="286" width="174" height="42" rx="21" fill="#F3F4F6"/>
  <text x="123" y="313" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Blazor Web App</text>
  <text x="309" y="313" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">API séparée</text>
  <text x="530" y="313" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Aspire + Docker</text>

  <rect x="92" y="368" width="212" height="112" rx="18" fill="#FFFFFF" stroke="#D8E3F4"/>
  <rect x="324" y="368" width="212" height="112" rx="18" fill="#FFFFFF" stroke="#D8E3F4"/>
  <rect x="556" y="368" width="212" height="112" rx="18" fill="#FFFFFF" stroke="#D8E3F4"/>
  <text x="122" y="414" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Shell applicatif</text>
  <text x="122" y="446" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="17">Navigation, sections et états globaux déjà cadrés.</text>
  <text x="354" y="414" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">UI réutilisable</text>
  <text x="354" y="446" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="17">Composants, feedback, modales et fondations.</text>
  <text x="586" y="414" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Backlog concret</text>
  <text x="586" y="446" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="17">Recherche, filtres, pagination, CRUD et API.</text>

  <text x="426" y="142" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.16em">VITRINE TECHNIQUE</text>
  <text x="426" y="184" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Starter Blazor/.NET pour application métier moderne</text>

  <rect x="426" y="278" width="122" height="78" rx="18" fill="#F8FAFC" stroke="#D8E3F4"/>
  <rect x="566" y="278" width="122" height="78" rx="18" fill="#F8FAFC" stroke="#D8E3F4"/>
  <rect x="706" y="278" width="122" height="78" rx="18" fill="#F8FAFC" stroke="#D8E3F4"/>
  <rect x="846" y="278" width="212" height="78" rx="18" fill="url(#accent)"/>
  <text x="458" y="315" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">8</text>
  <text x="458" y="338" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="16">projets</text>
  <text x="598" y="315" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">3</text>
  <text x="598" y="338" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="16">parcours</text>
  <text x="738" y="315" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">2</text>
  <text x="738" y="338" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="16">lancements</text>
  <text x="886" y="320" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">UI + API + backlog</text>

  <text x="426" y="492" fill="#1E293B" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Lisible pour GitHub, démontrable en local, crédible pour un projet réel.</text>
  <text x="910" y="492" fill="#2563EB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">blazor.arnaudwissart.fr</text>
</svg>
